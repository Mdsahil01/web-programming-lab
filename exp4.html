<!--
=========================================================
Experiment 4: Student Registration Form
=========================================================

Aim:
To design an HTML registration form.

Objectives:
• Use HTML form controls.
• Accept user input.
• Create a registration form using different input elements.

Theory:
HTML forms are used to collect information from users. Form
elements such as text boxes, radio buttons, checkboxes,
drop-down lists, and buttons allow users to enter and submit
their data.

=========================================================
-->

<!DOCTYPE html>
<html>

<head>
    <title>Student Registration Form</title>
</head>

<body>

<h1 align="center">Student Registration Form</h1>

<center>
<form>

<label>Student Name:</label><br>
<input type="text" placeholder="Enter your name"><br><br>

<label>USN:</label><br>
<input type="text" placeholder="Enter USN"><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter Email"><br><br>

<label>Password:</label><br>
<input type="password"><br><br>

<label>Gender:</label><br>

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<input type="radio" name="gender"> Other

<br><br>

<label>Department:</label><br>

<select>

<option>CSE</option>

<option>ISE</option>

<option>ECE</option>

<option>EEE</option>

<option>Mechanical</option>

</select>

<br><br>

<label>Skills:</label><br>

<input type="checkbox"> HTML

<input type="checkbox"> CSS

<input type="checkbox"> JavaScript

<input type="checkbox"> Python

<br><br>

<label>Address:</label><br>

<textarea rows="5" cols="35"></textarea>

<br><br>

<input type="submit" value="Register">

<input type="reset" value="Reset">

</form>
</center>

</body>

</html>
