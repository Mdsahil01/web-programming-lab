<!--
=========================================================
Experiment 2: Hyperlinks and Images
=========================================================

Aim:
To insert hyperlinks and images into a webpage.

Objectives:
• Learn the Anchor (<a>) tag.
• Learn the Image (<img>) tag.
• Create clickable hyperlinks.
• Display images on a webpage.

Theory:
The Anchor tag is used to create hyperlinks that connect one
webpage to another. The Image tag is used to display images
using the source (src) attribute and alternative text (alt).

=========================================================
-->
<!DOCTYPE html>
<html>

<head>
    <title>Hyperlinks and Images</title>
</head>

<body>

    <center>
    <h1>HTML Hyperlinks and Images</h1>

    <h2>Visit Google</h2>

    <a href="https://www.google.com" target="_blank">
        Open Google
    </a>

    <br><br>

    <h2>Sample Image</h2>

    <img src="assets/sample.png"
         alt="Sample Image"
         width="500"
         height="300">

     </center>

</body>

</html>
