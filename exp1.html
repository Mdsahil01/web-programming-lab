<!--
=========================================================
Experiment 1: Creating a Basic HTML Web Page
=========================================================

Aim:
To create a simple HTML webpage using basic HTML tags.

Objectives:
• Learn the HTML document structure.
• Use headings, paragraphs, and line breaks.
• Display formatted text.

Theory:
HTML (HyperText Markup Language) is the standard markup language
used to create web pages. It provides various tags to structure
and display content such as headings, paragraphs, images,
tables, and links.

=========================================================
-->

<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML Page</title>
</head>

<body>

    <center>
    <h1>Welcome to My Web Page</h1>

    <h2>About Me</h2>

    <p>
        My name is Sahil. I am a B.Tech CSE student.
        <br>
        I am learning HTML, CSS, and JavaScript.
    </p>

    <hr>

    <h3>Text Formatting</h3>

    <p>
        <b>Bold Text</b><br>
        <i>Italic Text</i><br>
        <u>Underlined Text</u>
    </p>
    </center>

</body>
</html>
